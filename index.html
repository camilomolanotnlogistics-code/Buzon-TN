<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buzón de Novedades - TN Logistics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, textarea, select { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; }
        input:focus, textarea:focus, select:focus { border-color: #38bdf8 !important; outline: none; ring: 2px; ring-color: #38bdf8; }
        
        .logo-img {
            max-height: 80px;
            width: auto;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- Encabezado Corporativo -->
    <div class="w-full max-w-2xl mb-8 text-center flex flex-col items-center">
        <div class="mb-4">
            <img src="TN_logo.png" alt="TN Logistics Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/200x80/1e293b/38bdf8?text=TN+Logistics'">
        </div>
        <h1 class="text-4xl font-bold text-white mb-2 uppercase tracking-tighter">TN Logistics</h1>
        <p class="text-sky-400 font-semibold uppercase tracking-widest text-sm">Buzón de Novedades</p>
        <div class="h-1 w-20 bg-sky-500 mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="w-full max-w-2xl">
        
        <!-- Formulario de Registro de Novedades -->
        <div class="glass p-8 rounded-3xl shadow-2xl border-t-4 border-sky-500">
            <div class="flex items-center justify-between mb-8">
                <h2 class="text-2xl font-bold flex items-center gap-2">
                    Registro de Novedad o Sugerencia
                </h2>
                <i class="fa-solid fa-clipboard-check text-sky-500 text-xl"></i>
            </div>
            
            <form id="noveltyForm" class="space-y-6">
                <!-- Información Básica -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Fecha del Evento</label>
                        <input type="date" id="eventDate" required class="w-full p-4 rounded-xl text-sm transition-all">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Tu Nombre (Opcional)</label>
                        <input type="text" id="userName" placeholder="Reporte Anónimo" class="w-full p-4 rounded-xl text-sm transition-all">
                    </div>
                </div>

                <!-- Clasificación (Actualizada y Ordenada Alfabéticamente) -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Departamento Responsable</label>
                    <select id="targetDept" required class="w-full p-4 rounded-xl text-sm transition-all cursor-pointer">
                        <option value="">Seleccionar departamento...</option>
                        <option value="Almacen">Almacén</option>
                        <option value="Calidad">Calidad</option>
                        <option value="Customer Service">Customer Service</option>
                        <option value="Finanzas">Finanzas</option>
                        <option value="Monitoreo">Monitoreo</option>
                        <option value="Otro">Otro</option>
                        <option value="Pricing">Pricing</option>
                        <option value="Recursos Humanos">Recursos Humanos</option>
                        <option value="Trafico">Tráfico</option>
                        <option value="Ventas">Ventas</option>
                    </select>
                </div>

                <!-- Detalle -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Descripción Detallada</label>
                    <textarea id="description" rows="5" required placeholder="Describe lo ocurrido o tu propuesta de mejora..." class="w-full p-4 rounded-xl text-sm transition-all resize-none"></textarea>
                </div>

                <!-- Evidencia -->
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Evidencia Fotográfica (Opcional)</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-slate-600 rounded-2xl cursor-pointer hover:border-sky-500 hover:bg-slate-800 transition-all group">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <i class="fa-solid fa-camera text-3xl mb-2 text-slate-500 group-hover:text-sky-500 transition-colors"></i>
                                <p class="mb-1 text-sm text-slate-400 font-semibold uppercase tracking-tight">Capturar o Subir Foto</p>
                                <p class="text-[10px] text-slate-500" id="fileCount">Formatos: JPG, PNG</p>
                            </div>
                            <input type="file" id="photos" accept="image/*" multiple class="hidden" onchange="updateFileName()" />
                        </label>
                    </div>
                </div>

                <!-- Botón de Envío -->
                <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-5 rounded-2xl shadow-xl transition-all transform hover:scale-[1.02] active:scale-95 uppercase tracking-widest flex items-center justify-center gap-3">
                    <i class="fa-solid fa-paper-plane"></i>
                    Enviar Reporte a Calidad
                </button>
            </form>
        </div>

        <div class="mt-8 text-center text-slate-500 text-xs italic">
            TN Logistics - Gestión Operativa y Mejora Continua
        </div>
    </div>

    <!-- Modal de Éxito -->
    <div id="successModal" class="fixed inset-0 bg-slate-950/90 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
        <div class="glass p-10 rounded-[2.5rem] max-w-sm w-full text-center border-2 border-sky-500 shadow-2xl">
            <div class="w-20 h-20 bg-sky-500/20 text-sky-400 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl shadow-lg">
                <i class="fa-solid fa-check-double"></i>
            </div>
            <h3 class="text-2xl font-bold mb-4 uppercase italic">¡Reporte Enviado!</h3>
            <p class="text-slate-400 mb-8 text-sm leading-relaxed">
                Gracias por tu compromiso con la excelencia. Tu novedad ha sido registrada en el Sistema de Gestión de Calidad.
            </p>
            <button onclick="closeModal()" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-black py-4 rounded-2xl transition-all uppercase tracking-widest shadow-lg shadow-sky-900/40">
                Aceptar
            </button>
        </div>
    </div>

    <script>
        // Establecer fecha actual por defecto
        document.getElementById('eventDate').valueAsDate = new Date();

        function updateFileName() {
            const input = document.getElementById('photos');
            const label = document.getElementById('fileCount');
            if (input.files.length > 0) {
                label.textContent = `${input.files.length} archivo(s) seleccionado(s)`;
                label.classList.add('text-sky-400', 'font-bold');
            } else {
                label.textContent = 'Formatos: JPG, PNG';
                label.classList.remove('text-sky-400', 'font-bold');
            }
        }

        document.getElementById('noveltyForm').onsubmit = function(e) {
            e.preventDefault();
            // Mostrar modal de éxito
            document.getElementById('successModal').classList.remove('hidden');
            document.getElementById('successModal').classList.add('flex');
            
            // Reiniciar formulario
            this.reset();
            document.getElementById('eventDate').valueAsDate = new Date();
            updateFileName();
        };

        function closeModal() {
            document.getElementById('successModal').classList.remove('flex');
            document.getElementById('successModal').classList.add('hidden');
        }
    </script>
</body>
</html>
